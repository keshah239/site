<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Страница в разработке — IT Digital Academy QA&amp;QC</title>
  <style>

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Courier New", Courier, monospace;
      color: #082d31;
      background: #edf4f3;
    }

    body {
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      isolation: isolate;
      min-height: 824px;
      height: 824px;
      overflow: hidden;
      background: #eef4f3;
      border-radius: 0 0 26px 26px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.62) 28%, rgba(255,255,255,0) 58%),
        radial-gradient(circle at 18% 74%, rgba(204, 215, 214, 0.34) 0%, rgba(204, 215, 214, 0.16) 28%, rgba(204, 215, 214, 0) 58%),
        radial-gradient(circle at 86% 68%, rgba(201, 212, 211, 0.28) 0%, rgba(201, 212, 211, 0.12) 26%, rgba(201, 212, 211, 0) 60%),
        linear-gradient(180deg, #f4f8f7 0%, #edf4f3 48%, #e7efee 100%);
    }

    .site-header {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 100;
      width: 100%;
      height: 155px;
      background: transparent;
    }

    .header-inner {
      width: 100%;
      height: 100%;
      padding: 0 56px 0 53px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .header-brand {
      margin-top: 50px;
      display: flex;
      align-items: center;
      gap: 28px;
      color: #0C383F;
      text-decoration: none;
      flex: 0 0 auto;
    }

    .brand-logo-wrap {
      display: flex;
      align-items: center;
      gap: 1.56px;
      transform: translateY(-30px);
    }

    .brand-mark-slot {
      width: 122px;
      height: 82px;
      flex: 0 0 122px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .brand-mark {
      display: block;
      width: 114px;
      height: auto;
      object-fit: contain;
      transform: translateY(1px);
      filter: saturate(1.05) contrast(1.18) brightness(0.82);
      opacity: 0.98;
    }

    .brand-title {
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-size: 21px;
      line-height: 1.04;
      font-weight: 600;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .brand-divider {
      width: 1px;
      height: 64px;
      background: rgba(12, 56, 63, 0.55);
      transform: translateY(-30px);
    }

    .brand-person {
      font-size: 21px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 3px;
      white-space: nowrap;
      transform: translateY(-30px);
    }

    .header-nav {
      margin-top: 50px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 25.8px;
      flex: 0 0 auto;
    }

    .header-nav a {
      display: inline-flex;
      align-items: center;
      font-family: "Courier New", Courier, monospace;
      font-size: 16px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      text-decoration: none;
      color: #0C383F;
      white-space: nowrap;
      transition: opacity 0.2s ease;
    }

    .header-nav a:hover {
      opacity: 0.65;
    }

    .burger {
      display: none;
      width: 38px;
      height: 30px;
      margin-top: 56px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .burger span {
      display: block;
      width: 100%;
      height: 2px;
      margin: 8px 0;
      background: #0C383F;
    }

    .hero-orbit {
      position: absolute;
      left: 45.8%;
      top: 168px;
      width: 610px;
      height: 610px;
      border-radius: 50%;
      border: 118px solid rgba(209, 224, 221, 0.38);
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }

    .hero-bird-bg {
      position: absolute;
      right: 52px;
      top: 170px;
      width: 450px;
      max-width: 24vw;
      height: auto;
      z-index: 3;
      opacity: 0.16;
      pointer-events: none;
      user-select: none;
    }

    .hero-copy {
      position: absolute;
      left: 62px;
      top: 205px;
      z-index: 6;
      width: 790px;
      max-width: calc(100vw - 720px);
      color: #0C383F;
    }

    .hero-copy__title {
      width: 790px;
      max-width: none;
      margin: 0;
      font-size: 62px;
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: -1.2px;
      color: #0C383F;
    }

    .hero-copy__title span {
      display: block;
      white-space: nowrap;
    }

    .hero-copy__typing {
      margin: 30px 0 18px;
      min-height: 36px;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: #0C383F;
    }

    .hero-copy__typing-label {
      opacity: 0.94;
    }

    .hero-copy__typing-word {
      display: inline-block;
      min-width: 210px;
      margin-left: 6px;
      color: #0C383F;
      white-space: nowrap;
    }

    .hero-copy__typing-word::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 0.95em;
      margin-left: 6px;
      background: #0C383F;
      vertical-align: -0.08em;
      animation: heroCursorBlink 0.9s steps(1, end) infinite;
    }

    @keyframes heroCursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .hero-copy__text {
      margin: 0;
      max-width: 510px;
      font-size: 21px;
      line-height: 1.52;
      font-weight: 400;
      color: rgba(12, 56, 63, 0.9);
    }

    .hero-copy__text + .hero-copy__text {
      margin-top: 8px;
    }

    .hero-person {
      position: absolute;
      left: calc(62.5vw - 441px);
      bottom: 126px;
      width: 1128px;
      max-width: 70vw;
      min-width: 912px;
      height: auto;
      z-index: 12;
      transform: none;
      pointer-events: none;
      user-select: none;
      -webkit-mask-image: linear-gradient(
        to bottom,
        #000 0%,
        #000 calc(100% - 190px),
        rgba(0, 0, 0, 0.82) calc(100% - 145px),
        rgba(0, 0, 0, 0.18) calc(100% - 82px),
        transparent 100%
      );
      mask-image: linear-gradient(
        to bottom,
        #000 0%,
        #000 calc(100% - 190px),
        rgba(0, 0, 0, 0.82) calc(100% - 145px),
        rgba(0, 0, 0, 0.18) calc(100% - 82px),
        transparent 100%
      );
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
    }

    .hero-person-cut-mask {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      height: 150px;
      z-index: 42;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.60) 26%,
        rgba(255, 255, 255, 0.94) 58%,
        #ffffff 100%
      );
    }

    .hero-features {
      position: absolute;
      left: 62px;
      right: 62px;
      bottom: 38px;
      z-index: 70;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .hero-feature-card {
      position: relative;
      z-index: 71;
      min-height: 150px;
      padding: 28px 30px;
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      align-items: start;
      column-gap: 18px;
      border: 1px solid rgba(8, 45, 49, 0.08);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 18px 44px rgba(8, 45, 49, 0.08);
    }

    .feature-code-icon {
      display: block;
      width: 62px;
      color: #0C383F;
      font-family: "Courier New", Courier, monospace;
      font-size: 30px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-align: left;
	  padding:7px;
    }

    .hero-feature-card h3 {
      margin: 0 0 8px;
      font-size: 19px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.7px;
      color: #0C383F;
    }

    .hero-feature-card p {
      margin: 0;
      font-size: 17px;
      line-height: 1.42;
      color: rgba(12, 56, 63, 0.82);
    }



    .hero-copy__cta-slot {
      position: relative;
      width: 510px;
      max-width: 100%;
      min-height: 68px;
      margin-top: 12px;
    }

    .hero-copy__cta-slot .hero-copy__text {
      transition:
        opacity 0.36s ease,
        transform 0.42s cubic-bezier(0.2, 0.8, 0.2, 1),
        visibility 0.36s ease;
    }

    .hero-copy__cta-slot.is-cta-visible .hero-copy__text {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
    }

    .start-learning-cta {
      position: absolute;
      left: 50%;
      top: 10px;
      z-index: 90;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 230px;
      min-height: 54px;
      padding: 16px 28px;
      border-radius: 999px;
      background: #0C383F;
      color: #ffffff;
      font-family: "Courier New", Courier, monospace;
      font-size: 16px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-decoration: none;
      box-shadow: 0 16px 38px rgba(12, 56, 63, 0.22);
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, 16px) scale(0.96);
      pointer-events: none;
      transition:
        opacity 0.45s ease,
        visibility 0.45s ease,
        transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1),
        box-shadow 0.25s ease;
      will-change: transform, opacity, box-shadow;
    }

    .hero-copy__cta-slot.is-cta-visible .start-learning-cta {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0) scale(1);
      pointer-events: auto;
      animation: startLearningSoftPulse 2.5s ease-in-out infinite;
    }

    .hero-copy__cta-slot.is-cta-visible .start-learning-cta:hover {
      box-shadow: 0 20px 48px rgba(12, 56, 63, 0.30);
      transform: translate(-50%, -2px) scale(1.015);
    }

    @keyframes startLearningSoftPulse {
      0%, 100% {
        box-shadow: 0 16px 38px rgba(12, 56, 63, 0.22);
        transform: translate(-50%, 0) scale(1);
      }
      50% {
        box-shadow: 0 20px 52px rgba(12, 56, 63, 0.34);
        transform: translate(-50%, 0) scale(1.035);
      }
    }

    @media (max-width: 1600px) {
      .hero-orbit {
        left: 43.5%;
        top: 176px;
        width: 560px;
        height: 560px;
        border-width: 104px;
      }

      .hero-copy {
        top: 205px;
        width: 720px;
        max-width: calc(100vw - 650px);
      }

      .hero-copy__title {
        width: 720px;
        font-size: 58px;
      }

      .hero-copy__typing {
        font-size: 28px;
      }

      .hero-copy__text {
        max-width: 480px;
        font-size: 20px;
      }

      .hero-copy__cta-slot {
        width: 480px;
      }

      .hero-person {
        left: calc(62.5vw - 406px);
        bottom: 130px;
        width: 1032px;
        max-width: 68vw;
        min-width: 840px;
      }

      .hero-bird-bg {
        right: 28px;

      }
    }

    @media (max-width: 1440px) {

      }

      .brand-title,
      .brand-person {

      }

      }

      .header-nav a {

      }
    }

    @media (max-width: 1280px) {
      .hero-orbit {

      }

      }

      .hero-copy__title {
        width: 610px;

      }

      .hero-copy__typing {
        font-size: 25px;
      }

      .hero-copy__text {
        font-size: 19px;

      }

      .hero-copy__cta-slot {
        width: 430px;
      }

      .hero-person {
        left: calc(50% + 20px);

        width: 864px;

      }

      .hero-bird-bg {
        right: 8px;

      }

      .hero-features {
        left: 40px;
        right: 40px;

      }

      .hero-feature-card {
        min-height: 132px;

        grid-template-columns: 58px minmax(0, 1fr);

      }

      .hero-person-cut-mask {
        height: 142px;

      }
    }

    @media (max-width: 1080px) {
      .hero {
        height: 760px;

      }

      .site-header {

      }

      .header-inner {
        align-items: flex-start;
        padding: 0 28px;
      }

      .header-brand {
        margin-top: 32px;
        gap: 18px;
      }

      .header-nav {

      }

      .burger {
        display: block;

      }

      .hero-orbit {
        left: 50%;

      }

      .hero-copy {
        left: 28px;

        width: min(92vw, 560px);

      }

      .hero-copy__title {
        width: min(92vw, 560px);

      }

      .hero-copy__typing {

      }

      .hero-copy__text {

        max-width: 380px;
      }

      .hero-copy__cta-slot {
        width: 380px;
      }

      .hero-person {
        left: calc(66% - 50px);

        width: 672px;
        max-width: 74vw;
        min-width: 0;
        transform: translateX(-50%);
      }

      .hero-bird-bg {
        right: 8px;
        top: 184px;
        width: 360px;
        max-width: 30vw;
        opacity: 0.13;
      }

      .hero-features {
        left: 28px;
        right: 28px;
        bottom: 32px;
      }

      .hero-feature-card h3 {

      }

      .hero-feature-card p {

      }
    }

    @media (max-width: 640px) {

      }

      }

      }

      .brand-logo-wrap {
        gap: 8px;

      }

      .brand-mark-slot {
        width: 64px;

      }

      }

      }

      }

      }

      }

      }

      }

      }

      .hero-features {

      }

      .hero-feature-card {
        min-height: auto;

      }

      }

    @media (max-width: 640px) {

      }

      .hero-orbit {

      }

      }

      .hero-person {

      }

      .hero-person-cut-mask {

      inset: -12% -18%;
      background:
        radial-gradient(circle at 18% 50%, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0.42) 21%, rgba(255,255,255,0) 46%),

  <script>
    (function () {
      const burger = document.querySelector('.burger');
      const nav = document.querySelector('.header-nav');

      if (burger && nav) {
        burger.setAttribute('aria-expanded', 'false');

        burger.addEventListener('click', function () {
          const isOpen = document.body.classList.toggle('is-menu-open');
          burger.setAttribute('aria-expanded', String(isOpen));
        });

        nav.addEventListener('click', function (event) {
          const link = event.target.closest('a');
          if (!link) return;
          document.body.classList.remove('is-menu-open');
          burger.setAttribute('aria-expanded', 'false');
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            document.body.classList.remove('is-menu-open');
            burger.setAttribute('aria-expanded', 'false');
          }
        });
      }
    })();
  </script>

<script>
    (function () {
      const daysEl = document.querySelector('[data-countdown-days]');
      const hoursEl = document.querySelector('[data-countdown-hours]');
      const minutesEl = document.querySelector('[data-countdown-minutes]');
      const secondsEl = document.querySelector('[data-countdown-seconds]');

      if (!daysEl || !hoursEl || !minutesEl || !secondsEl) return;

      const targetDate = new Date('2026-12-10T00:00:00+03:00').getTime();

      function pad(value, length) {
        return String(Math.max(0, value)).padStart(length, '0');
      }

      function updateCountdown() {
        const now = Date.now();
        const distance = Math.max(0, targetDate - now);

        const totalSeconds = Math.floor(distance / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        daysEl.textContent = pad(days, 3);
        hoursEl.textContent = pad(hours, 2);
        minutesEl.textContent = pad(minutes, 2);
        secondsEl.textContent = pad(seconds, 2);
      }

      updateCountdown();
      window.setInterval(updateCountdown, 1000);
    })();
</script>
